<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Kingdom 24</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f9;
margin:0;
text-align:center;
}

header{
background:#222;
color:white;
padding:15px;
font-size:22px;
}

.container{
background:white;
max-width:600px;
margin:20px auto;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

textarea{
width:90%;
height:80px;
padding:10px;
margin-top:10px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#007bff;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.quote{
margin-top:20px;
padding:30px;
border-radius:10px;
background:#e9ecef;
font-size:20px;
font-weight:bold;
}

footer{
margin-top:20px;
padding:15px;
background:#222;
color:white;
}

a{
color:#ffcc00;
text-decoration:none;
}

</style>

</head>

<body>
<p style="color:gray;">Create, download and share powerful affirmations</p>
<header>
Learning Kingdom 24
</header>

<div class="container">

<h2>Post Positive Quote</h2>

<textarea id="quoteInput" placeholder="Write your positive affirmation..."></textarea>
<br>

<button onclick="postQuote()">Post</button>

<div id="quotes"></div>

</div>

<div class="container">

<h3>Chat With Us</h3>


<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_subject" value="New Message from Learning Kingdom 24">

<form action="https://formsubmit.co/learningkingdom24@gmail.com" method="POST">

<input type="text" name="name" placeholder="Your Name" required><br><br>

<input type="email" name="email" placeholder="Your Email" required><br><br>

<textarea name="message" placeholder="Your Message" required></textarea><br><br>

<button type="submit">Send Message</button>

<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_subject" value="New Message from Learning Kingdom 24">

</form>


</form>

</div>

<footer>

Visit our YouTube:
<a href="https://www.youtube.com/@learningkingdom24" target="_blank">
@learningkingdom24
</a>

</footer>

<script>

function postQuote(){

let quoteText=document.getElementById("quoteInput").value;

if(quoteText===""){
alert("Please write a quote");
return;
}

let quoteBox=document.createElement("div");
quoteBox.className="quote";

let text=document.createElement("p");
text.innerText=quoteText;


let btnPNG=document.createElement("button");
btnPNG.innerText="Download PNG";

let btnJPG=document.createElement("button");
btnJPG.innerText="Download JPG";

btnPNG.onclick=function(){
downloadImage(quoteBox,"png");
}

btnJPG.onclick=function(){
downloadImage(quoteBox,"jpeg");
}

quoteBox.appendChild(text);
quoteBox.appendChild(btnPNG);
quoteBox.appendChild(btnJPG);

document.getElementById("quotes").appendChild(quoteBox);

document.getElementById("quoteInput").value="";

}

function downloadImage(element,type){

let buttons=element.querySelectorAll("button");
buttons.forEach(btn=>btn.style.display="none");

html2canvas(element).then(canvas=>{

let link=document.createElement("a");

if(type==="png"){
link.download="quote.png";
link.href=canvas.toDataURL("image/png");
}

if(type==="jpeg"){
link.download="quote.jpg";
link.href=canvas.toDataURL("image/jpeg");
}

link.click();

buttons.forEach(btn=>btn.style.display="inline-block");

});

}

</script>

</body>
</html>
